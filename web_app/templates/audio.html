<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Анализ Аудио | AI SYSTEM v2.0</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root { --bg-color: #0f172a; --surface-color: #1e293b; --primary: #10b981; --primary-glow: rgba(16, 185, 129, 0.5); --text-main: #f8fafc; --text-muted: #94a3b8; }
        body { font-family: 'Inter', system-ui, sans-serif; background: var(--bg-color); background-image: radial-gradient(circle at 50% 100%, rgba(16, 185, 129, 0.1) 0px, transparent 60%); color: var(--text-main); min-height: 100vh; }
        
        /* Навигация */
        nav { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(20px); border-bottom: 1px solid rgba(255,255,255,0.05); position: sticky; top: 0; z-index: 100; }
        nav .container { max-width: 1400px; margin: 0 auto; padding: 0 20px; display: flex; justify-content: space-between; align-items: center; height: 75px; }
        nav .logo { font-size: 1.5em; font-weight: 900; background: linear-gradient(135deg, #60a5fa, #c084fc); -webkit-background-clip: text; -webkit-text-fill-color: transparent; display: flex; align-items: center; gap: 10px; text-decoration: none; }
        nav .links { display: flex; gap: 15px; list-style: none; }
        nav .links a { text-decoration: none; color: var(--text-muted); font-weight: 500; padding: 8px 16px; border-radius: 12px; transition: all 0.3s; display: flex; align-items: center; gap: 8px; }
        nav .links a:hover, nav .links a.active { color: var(--text-main); background: rgba(255,255,255,0.05); }

        .workspace { max-width: 1400px; margin: 40px auto; padding: 0 20px; display: grid; grid-template-columns: 1fr 1fr; gap: 30px; align-items: start; }
        @media (max-width: 1000px) { .workspace { grid-template-columns: 1fr; } }
        
        .panel { background: var(--surface-color); border: 1px solid rgba(255,255,255,0.05); border-radius: 24px; padding: 30px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); position: relative; }
        .panel::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px; background: linear-gradient(90deg, transparent, rgba(16, 185, 129, 0.3), transparent); }

        /* Upload & Audio */
        .upload-area { border: 2px dashed rgba(255,255,255,0.1); border-radius: 16px; padding: 60px 20px; text-align: center; cursor: pointer; transition: 0.3s; position: relative; background: rgba(0,0,0,0.2); margin-top: 20px; }
        .upload-area:hover { border-color: var(--primary); background: rgba(16, 185, 129, 0.05); }
        .upload-icon { font-size: 4em; color: var(--primary); margin-bottom: 20px; filter: drop-shadow(0 0 10px rgba(16,185,129,0.3)); }
        .upload-area input { position: absolute; inset: 0; width: 100%; height: 100%; opacity: 0; cursor: pointer; }
        
        audio { width: 100%; margin-top: 20px; outline: none; border-radius: 30px; display: none; }
        
        /* Визуализатор */
        .visualizer { display: none; height: 60px; margin-top: 20px; align-items: flex-end; gap: 4px; justify-content: center; }
        .vis-bar { width: 8px; background: var(--primary); border-radius: 4px; animation: bounce 0.5s ease-in-out infinite alternate; box-shadow: 0 0 10px var(--primary); }
        .vis-bar:nth-child(1) { animation-delay: 0.1s; } .vis-bar:nth-child(2) { animation-delay: 0.3s; } .vis-bar:nth-child(3) { animation-delay: 0.2s; }
        .vis-bar:nth-child(4) { animation-delay: 0.4s; } .vis-bar:nth-child(5) { animation-delay: 0.1s; } .vis-bar:nth-child(6) { animation-delay: 0.5s; }
        .vis-bar:nth-child(7) { animation-delay: 0.2s; } .vis-bar:nth-child(8) { animation-delay: 0.3s; }
        @keyframes bounce { from { height: 10px; } to { height: 100%; } }

        .btn-analyze { background: linear-gradient(135deg, #10b981, #059669); color: white; border: none; padding: 18px; border-radius: 14px; font-size: 1.1em; font-weight: 700; cursor: pointer; margin-top: 20px; transition: 0.3s; display: none; width: 100%; align-items: center; justify-content: center; gap: 10px; }
        .btn-analyze:hover { transform: translateY(-3px); box-shadow: 0 10px 25px var(--primary-glow); }

        /* Results */
        .res-ring { display: none; text-align: center; margin-bottom: 30px; position: relative; }
        .circle-wrap { width: 150px; height: 150px; border-radius: 50%; border: 8px solid rgba(16, 185, 129, 0.2); margin: 0 auto; display: flex; align-items: center; justify-content: center; font-size: 4em; border-top-color: var(--primary); animation: ringFade 1s forwards; position: relative; box-shadow: 0 0 30px rgba(16, 185, 129, 0.2); }
        @keyframes ringFade { 0% { transform: scale(0.8); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }

        .score-bar { background: rgba(0,0,0,0.3); padding: 15px; border-radius: 12px; margin-bottom: 10px; }
        .sc-title { font-size: 0.9em; font-weight: 600; color: var(--text-muted); display: flex; justify-content: space-between; margin-bottom: 8px; }
        .sc-track { height: 8px; background: rgba(255,255,255,0.05); border-radius: 4px; overflow: hidden; }
        .sc-fill { height: 100%; background: var(--primary); width: 0%; box-shadow: 0 0 10px var(--primary); transition: width 0.8s ease-out; }
    </style>
</head>
<body>
    <nav>
        <div class="container">
            <a href="/" class="logo"><i class="fa-solid fa-microchip"></i> AI SYSTEM</a>
            <ul class="links">
                <li><a href="/"><i class="fa-solid fa-house"></i> Главная</a></li>
                <li><a href="/camera"><i class="fa-solid fa-camera"></i> Камера</a></li>
                <li><a href="/photo"><i class="fa-solid fa-image"></i> Фото</a></li>
                <li><a href="/text"><i class="fa-solid fa-comment-dots"></i> Текст</a></li>
                <li><a href="/audio" class="active"><i class="fa-solid fa-microphone"></i> Аудио</a></li>
                <li><a href="/lie-detector" style="color: #ef4444;"><i class="fa-solid fa-fingerprint"></i> Детектор Лжи</a></li>
            </ul>
        </div>
    </nav>

    <div class="workspace">
        <div class="panel">
            <h2 style="margin-bottom: 5px; font-weight: 800; color: var(--primary);"><i class="fa-solid fa-wave-square"></i> Анализ Интонации</h2>
            <p style="color: var(--text-muted); margin-bottom: 20px;">Извлечение эмоций из тембра и формант (Voice Metrics).</p>
            
            <div class="upload-area" id="dropZone">
                <i class="fa-solid fa-file-audio upload-icon"></i>
                <h3 style="margin-bottom: 10px;">Загрузите голосовую запись</h3>
                <p style="color: var(--text-muted); font-size: 0.9em;">Поддерживается: WAV, MP3, OGG</p>
                <input type="file" id="audioInput" accept="audio/*">
            </div>

            <audio id="audioPreview" controls></audio>
            <button class="btn-analyze" id="analyzeBtn" onclick="runAudioAnalysis()"><i class="fa-solid fa-bolt"></i> ПРОСЛУШАТЬ И ОЦЕНИТЬ</button>

            <!-- Фишечка: псевдо-анализатор -->
            <div class="visualizer" id="visAnim">
                <div class="vis-bar"></div><div class="vis-bar"></div><div class="vis-bar"></div>
                <div class="vis-bar"></div><div class="vis-bar"></div><div class="vis-bar"></div>
                <div class="vis-bar"></div><div class="vis-bar"></div>
            </div>
        </div>

        <div class="panel">
            <h2 style="margin-bottom: 20px; font-weight: 800;"><i class="fa-solid fa-chart-column"></i> Речевой Вектор</h2>
            <p id="initText" style="color: var(--text-muted); text-align: center; margin-top: 50px;">Ожидание загрузки файла...</p>
            
            <div class="res-ring" id="resRing">
                <div class="circle-wrap" id="mainEmoji">😶</div>
                <h3 style="margin-top: 15px; font-weight: 800; font-size: 1.4em;" id="mainLabel">Нейтрально</h3>
            </div>
            
            <div id="resultsContainer"></div>
        </div>
    </div>

    <script>
        const audioInput = document.getElementById('audioInput');
        const audioPreview = document.getElementById('audioPreview');
        const analyzeBtn = document.getElementById('analyzeBtn');
        const dropZone = document.getElementById('dropZone');
        const visAnim = document.getElementById('visAnim');
        let selectedFile = null;

        audioInput.addEventListener('change', function() {
            const file = this.files[0];
            if (file) {
                selectedFile = file;
                const url = URL.createObjectURL(file);
                audioPreview.src = url;
                audioPreview.style.display = 'block';
                dropZone.style.display = 'none';
                analyzeBtn.style.display = 'flex';
                document.getElementById('initText').textContent = "Файл готов к анализу. Нажмите 'ОЦЕНИТЬ'.";
            }
        });

        async function runAudioAnalysis() {
            document.getElementById('initText').style.display = 'none';
            analyzeBtn.style.opacity = '0.5';
            analyzeBtn.disabled = true;
            visAnim.style.display = 'flex';
            document.getElementById('resRing').style.display = 'none';
            document.getElementById('resultsContainer').innerHTML = '';

            const formData = new FormData();
            formData.append('audio', selectedFile);

            try {
                const res = await fetch('/api/recognize-audio', { method: 'POST', body: formData });
                const data = await res.json();
                
                // Имитируем парсинг аудиодорожки
                setTimeout(() => {
                    visAnim.style.display = 'none';
                    analyzeBtn.style.opacity = '1';
                    analyzeBtn.disabled = false;

                    const emotionNamesRus = { 'Angry': 'Досада / Гнев', 'Disgust': 'Отвращение', 'Fear': 'Страх', 'Happy': 'Радость', 'Neutral': 'Нейтрально', 'Sad': 'Грусть', 'Surprise': 'Удивление' };

                    document.getElementById('mainEmoji').textContent = data.emoji;
                    document.getElementById('mainLabel').textContent = emotionNamesRus[data.emotion];
                    document.getElementById('resRing').style.display = 'block';

                    const sorted = Object.entries(data.scores).sort((a,b) => b[1] - a[1]);
                    document.getElementById('resultsContainer').innerHTML = sorted.map(([emo, val]) => `
                        <div class="score-bar">
                            <div class="sc-title"><span>${emotionNamesRus[emo]||emo}</span><span>${val.toFixed(1)}%</span></div>
                            <div class="sc-track"><div class="sc-fill" style="width: ${val}%;"></div></div>
                        </div>
                    `).join('');
                }, 1500);

            } catch (err) {
                alert("Ошибка соединения с API");
                visAnim.style.display = 'none';
            }
        }
    </script>
</body>
</html>
