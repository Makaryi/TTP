<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Анализ Текста | AI SYSTEM v2.0</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root { --bg-color: #0f172a; --surface-color: #1e293b; --primary: #8b5cf6; --primary-glow: rgba(139, 92, 246, 0.5); --text-main: #f8fafc; --text-muted: #94a3b8; }
        body { font-family: 'Inter', system-ui, sans-serif; background: var(--bg-color); background-image: radial-gradient(circle at 100% 100%, rgba(139, 92, 246, 0.15) 0px, transparent 40%); color: var(--text-main); min-height: 100vh; }
        
        /* Навигация */
        nav { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(20px); border-bottom: 1px solid rgba(255,255,255,0.05); position: sticky; top: 0; z-index: 100; }
        nav .container { max-width: 1400px; margin: 0 auto; padding: 0 20px; display: flex; justify-content: space-between; align-items: center; height: 75px; }
        nav .logo { font-size: 1.5em; font-weight: 900; background: linear-gradient(135deg, #60a5fa, #c084fc); -webkit-background-clip: text; -webkit-text-fill-color: transparent; display: flex; align-items: center; gap: 10px; text-decoration: none; }
        nav .links { display: flex; gap: 15px; list-style: none; }
        nav .links a { text-decoration: none; color: var(--text-muted); font-weight: 500; padding: 8px 16px; border-radius: 12px; transition: all 0.3s; display: flex; align-items: center; gap: 8px; }
        nav .links a:hover, nav .links a.active { color: var(--text-main); background: rgba(255,255,255,0.05); }

        .workspace { max-width: 1400px; margin: 40px auto; padding: 0 20px; display: grid; grid-template-columns: 1fr 1fr; gap: 30px; align-items: stretch; }
        @media (max-width: 1000px) { .workspace { grid-template-columns: 1fr; } }
        
        .panel { background: var(--surface-color); border: 1px solid rgba(255,255,255,0.05); border-radius: 24px; padding: 30px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); position: relative; }
        .panel::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px; background: linear-gradient(90deg, transparent, rgba(139, 92, 246, 0.3), transparent); }

        .text-area { width: 100%; height: 300px; background: rgba(0,0,0,0.2); border: 1px solid rgba(255,255,255,0.1); border-radius: 16px; padding: 20px; color: var(--text-main); font-size: 1.1em; line-height: 1.6; font-family: inherit; resize: none; transition: 0.3s; box-shadow: inset 0 0 20px rgba(0,0,0,0.5); }
        .text-area:focus { outline: none; border-color: var(--primary); box-shadow: inset 0 0 20px rgba(139, 92, 246, 0.1); }
        .text-area::placeholder { color: #475569; }

        .btn-analyze { background: linear-gradient(135deg, #8b5cf6, #c084fc); color: white; border: none; padding: 18px 40px; border-radius: 14px; font-size: 1.1em; font-weight: 700; cursor: pointer; margin-top: 20px; transition: 0.3s; display: inline-flex; align-items: center; gap: 10px; width: 100%; justify-content: center; }
        .btn-analyze:hover { transform: translateY(-3px); box-shadow: 0 10px 25px var(--primary-glow); }

        /* Results UI */
        .res-container { display: flex; flex-direction: column; gap: 20px; opacity: 0; transition: opacity 0.5s; }
        .res-header { display: flex; justify-content: space-between; align-items: center; background: rgba(0,0,0,0.2); padding: 20px; border-radius: 16px; border: 1px solid rgba(255,255,255,0.02); }
        .hero-emoji { font-size: 4em; line-height: 1; filter: drop-shadow(0 0 15px rgba(255,255,255,0.2)); }
        .score-bar { background: rgba(0,0,0,0.3); padding: 15px; border-radius: 12px; display: flex; flex-direction: column; gap: 8px; }
        .sc-title { font-size: 0.9em; font-weight: 600; color: var(--text-muted); display: flex; justify-content: space-between; }
        .sc-track { height: 8px; background: rgba(255,255,255,0.05); border-radius: 4px; overflow: hidden; }
        .sc-fill { height: 100%; background: var(--primary); width: 0%; box-shadow: 0 0 10px var(--primary); transition: width 1s ease-out; }

        .typewriter { overflow: hidden; white-space: nowrap; border-right: 2px solid var(--primary); animation: typing 2.5s steps(40, end), blink-caret .75s step-end infinite; color: var(--text-muted); }
        @keyframes blink-caret { from, to { border-color: transparent } 50% { border-color: var(--primary); } }
        
        .loader { display: none; margin: 50px auto; width: 50px; height: 50px; border: 5px solid rgba(255,255,255,0.1); border-top-color: var(--primary); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <nav>
        <div class="container">
            <a href="/" class="logo"><i class="fa-solid fa-microchip"></i> AI SYSTEM</a>
            <ul class="links">
                <li><a href="/"><i class="fa-solid fa-house"></i> Главная</a></li>
                <li><a href="/camera"><i class="fa-solid fa-camera"></i> Камера</a></li>
                <li><a href="/photo"><i class="fa-solid fa-image"></i> Фото</a></li>
                <li><a href="/text" class="active"><i class="fa-solid fa-comment-dots"></i> Текст</a></li>
                <li><a href="/audio"><i class="fa-solid fa-microphone"></i> Аудио</a></li>
                <li><a href="/lie-detector" style="color: #ef4444;"><i class="fa-solid fa-fingerprint"></i> Детектор Лжи</a></li>
            </ul>
        </div>
    </nav>

    <div class="workspace">
        <div class="panel">
            <h2 style="margin-bottom: 20px; font-weight: 800; color: #c084fc;"><i class="fa-solid fa-language"></i> Текстовая Семантика NLP</h2>
            <textarea id="textInput" class="text-area" placeholder="Введите текст сюда... 
Пример: Я не знаю, как это описать, но меня все невероятно раздражает."></textarea>
            <button class="btn-analyze" id="analyzeBtn" onclick="runTextAnalysis()"><i class="fa-solid fa-robot"></i> ЗАПУСТИТЬ ОЦЕНКУ NLP</button>
        </div>

        <div class="panel">
            <h2 style="margin-bottom: 20px; font-weight: 800;"><i class="fa-solid fa-chart-pie"></i> Тональность текста</h2>
            
            <div id="welcomeState" style="text-align: center; color: var(--text-muted); padding: 50px 0;">
                <i class="fa-solid fa-comment-dots" style="font-size: 3em; margin-bottom: 15px; opacity: 0.5;"></i>
                <p>Нейросеть проанализирует эмоциональный окрас слов.</p>
            </div>
            
            <div class="loader" id="loader"></div>
            
            <div class="res-container" id="resultsPanel">
                <div class="res-header">
                    <div>
                        <div style="font-size: 0.9em; color: var(--text-muted); margin-bottom: 5px;">ДОМИНИРУЮЩАЯ ЭМОЦИЯ</div>
                        <div style="font-size: 2em; font-weight: 900; color: #c084fc;" id="domLabel">-</div>
                    </div>
                    <div class="hero-emoji" id="domEmoji">😶</div>
                </div>
                
                <div id="barsInjection"></div>
            </div>
        </div>
    </div>

    <script>
        const emotionNamesRus = { 'Angry': 'Досада / Гнев', 'Disgust': 'Отвращение', 'Fear': 'Страх', 'Happy': 'Радость', 'Neutral': 'Нейтрально', 'Sad': 'Грусть', 'Surprise': 'Удивление' };
        
        async function runTextAnalysis() {
            const text = document.getElementById('textInput').value;
            if (!text.trim()) { alert('Введите текст!'); return; }

            document.getElementById('welcomeState').style.display = 'none';
            document.getElementById('resultsPanel').style.opacity = '0';
            document.getElementById('loader').style.display = 'block';
            document.getElementById('analyzeBtn').disabled = true;
            document.getElementById('analyzeBtn').style.opacity = '0.5';

            try {
                const res = await fetch('/api/recognize-text', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text: text })
                });
                const data = await res.json();
                
                setTimeout(() => {
                    document.getElementById('loader').style.display = 'none';
                    document.getElementById('analyzeBtn').disabled = false;
                    document.getElementById('analyzeBtn').style.opacity = '1';
                    
                    document.getElementById('domLabel').textContent = emotionNamesRus[data.emotion];
                    document.getElementById('domEmoji').textContent = data.emoji;

                    const sorted = Object.entries(data.scores).sort((a, b) => b[1] - a[1]);
                    document.getElementById('barsInjection').innerHTML = sorted.map(([emo, val]) => `
                        <div class="score-bar">
                            <div class="sc-title"><span>${emotionNamesRus[emo] || emo}</span><span>${val.toFixed(1)}%</span></div>
                            <div class="sc-track"><div class="sc-fill" style="width: ${val}%;"></div></div>
                        </div>
                    `).join('');

                    document.getElementById('resultsPanel').style.opacity = '1';
                }, 800); // Фишечка: Искусственная задержка для имитации "тяжелых нейросетевых NLP" вычислений
            } catch (e) {
                alert("Ошибка соединения с API");
                document.getElementById('loader').style.display = 'none';
            }
        }
    </script>
</body>
</html>
