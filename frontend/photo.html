<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Анализ Фотографий | AI SYSTEM v2.0</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800;900&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root { --bg-color: #0f172a; --surface-color: #1e293b; --primary: #3b82f6; --primary-glow: rgba(59, 130, 246, 0.5); --text-main: #f8fafc; --text-muted: #94a3b8; }
        body { font-family: 'Inter', system-ui, sans-serif; background: var(--bg-color); background-image: radial-gradient(circle at 0% 100%, rgba(139, 92, 246, 0.15) 0px, transparent 50%); color: var(--text-main); min-height: 100vh; }
        
        /* Навигация */
        nav { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(20px); border-bottom: 1px solid rgba(255,255,255,0.05); position: sticky; top: 0; z-index: 100; }
        nav .container { max-width: 1400px; margin: 0 auto; padding: 0 20px; display: flex; justify-content: space-between; align-items: center; height: 75px; }
        nav .logo { font-size: 1.5em; font-weight: 900; background: linear-gradient(135deg, #60a5fa, #c084fc); -webkit-background-clip: text; -webkit-text-fill-color: transparent; display: flex; align-items: center; gap: 10px; text-decoration: none; }
        nav .links { display: flex; gap: 15px; list-style: none; }
        nav .links a { text-decoration: none; color: var(--text-muted); font-weight: 500; padding: 8px 16px; border-radius: 12px; transition: all 0.3s; display: flex; align-items: center; gap: 8px; }
        nav .links a:hover, nav .links a.active { color: var(--text-main); background: rgba(255,255,255,0.05); }

        .workspace { max-width: 1400px; margin: 40px auto; padding: 0 20px; display: grid; grid-template-columns: 1fr 1fr; gap: 30px; align-items: start; }
        @media (max-width: 1000px) { .workspace { grid-template-columns: 1fr; } }
        
        .panel { background: var(--surface-color); border: 1px solid rgba(255,255,255,0.05); border-radius: 24px; padding: 30px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); position: relative; }
        .panel::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px; background: linear-gradient(90deg, transparent, rgba(59, 130, 246, 0.3), transparent); }

        .upload-area { border: 2px dashed rgba(255,255,255,0.1); border-radius: 16px; padding: 50px 20px; text-align: center; cursor: pointer; transition: 0.3s; position: relative; background: rgba(0,0,0,0.2); }
        .upload-area:hover, .upload-area.dragover { border-color: var(--primary); background: rgba(59, 130, 246, 0.05); box-shadow: inset 0 0 30px rgba(59, 130, 246, 0.1); }
        .upload-icon { font-size: 3em; color: var(--primary); margin-bottom: 15px; }
        .upload-area input { position: absolute; inset: 0; width: 100%; height: 100%; opacity: 0; cursor: pointer; }
        #imgPreview { max-width: 100%; border-radius: 12px; display: none; box-shadow: 0 10px 30px rgba(0,0,0,0.5); margin-top: 20px; }

        .btn-analyze { width: 100%; background: linear-gradient(135deg, #3b82f6, #6366f1); color: white; border: none; padding: 18px; border-radius: 14px; font-size: 1.1em; font-weight: 700; cursor: pointer; margin-top: 20px; transition: 0.3s; display: none; }
        .btn-analyze:hover { transform: translateY(-3px); box-shadow: 0 10px 25px var(--primary-glow); }

        .face-card { background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.05); border-radius: 16px; padding: 20px; margin-bottom: 15px; display: flex; align-items: center; gap: 20px; animation: slideIn 0.4s ease forwards; }
        @keyframes slideIn { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: translateX(0); } }
        .face-emoji { font-size: 3.5em; filter: drop-shadow(0 0 10px rgba(255,255,255,0.1)); }
        .face-data { flex: 1; }
        .face-title { font-weight: 800; color: #60a5fa; margin-bottom: 5px; }
        .face-stat { display: flex; justify-content: space-between; font-size: 0.9em; color: var(--text-muted); margin-bottom: 8px; }
        .progress-bg { height: 6px; background: rgba(255,255,255,0.1); border-radius: 3px; overflow: hidden; }
        .progress-fill { height: 100%; background: var(--primary); width: 0%; box-shadow: 0 0 10px var(--primary); transition: 1s cubic-bezier(0.1, 0.7, 0.1, 1); }

        /* Loader */
        .loader { display: none; width: 40px; height: 40px; border: 4px solid rgba(255,255,255,0.1); border-top-color: var(--primary); border-radius: 50%; animation: spin 1s linear infinite; margin: 20px auto; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <nav>
        <div class="container">
            <a href="/" class="logo"><i class="fa-solid fa-microchip"></i> AI SYSTEM</a>
            <ul class="links">
                <li><a href="/"><i class="fa-solid fa-house"></i> Главная</a></li>
                <li><a href="/camera"><i class="fa-solid fa-camera"></i> Камера</a></li>
                <li><a href="/photo" class="active"><i class="fa-solid fa-image"></i> Фото</a></li>
                <li><a href="/text"><i class="fa-solid fa-comment-dots"></i> Текст</a></li>
                <li><a href="/audio"><i class="fa-solid fa-microphone"></i> Аудио</a></li>
                <li><a href="/lie-detector" style="color: #ef4444;"><i class="fa-solid fa-fingerprint"></i> Детектор Лжи</a></li>
            </ul>
        </div>
    </nav>

    <div class="workspace">
        <div class="panel">
            <h2 style="margin-bottom: 20px; font-weight: 800;"><i class="fa-solid fa-cloud-arrow-up"></i> Загрузка снимка</h2>
            <div class="upload-area" id="dropZone">
                <i class="fa-solid fa-file-image upload-icon"></i>
                <h3 style="margin-bottom: 10px;">Перетащите фото сюда</h3>
                <p style="color: var(--text-muted); font-size: 0.9em;">или кликните для выбора (JPG, PNG)</p>
                <input type="file" id="fileInput" accept="image/*">
            </div>
            <img id="imgPreview">
            <button class="btn-analyze" id="analyzeBtn" onclick="runAnalysis()"><i class="fa-solid fa-brain"></i> ЗАПУСТИТЬ ИИ-АНАЛИЗ</button>
        </div>

        <div class="panel">
            <h2 style="margin-bottom: 20px; font-weight: 800;"><i class="fa-solid fa-list-check"></i> Результаты</h2>
            <p id="initText" style="color: var(--text-muted);">Загрузите фото для поиска лиц и распознавания эмоций (используется реальная модель H5 🚀).</p>
            <div class="loader" id="loader"></div>
            <div id="resultsContainer"></div>
        </div>
    </div>

    <script>
        const fileInput = document.getElementById('fileInput');
        const imgPreview = document.getElementById('imgPreview');
        const analyzeBtn = document.getElementById('analyzeBtn');
        const dropZone = document.getElementById('dropZone');
        let selectedFile = null;

        // Фишечка: Драг-н-дроп и превью
        fileInput.addEventListener('change', function() {
            const file = this.files[0];
            if (file) {
                selectedFile = file;
                const reader = new FileReader();
                reader.onload = e => { 
                    imgPreview.src = e.target.result; 
                    imgPreview.style.display = 'block'; 
                    dropZone.style.display = 'none';
                    analyzeBtn.style.display = 'block';
                };
                reader.readAsDataURL(file);
            }
        });

        async function runAnalysis() {
            if (!selectedFile) return;
            
            document.getElementById('initText').style.display = 'none';
            document.getElementById('loader').style.display = 'block';
            document.getElementById('resultsContainer').innerHTML = '';
            analyzeBtn.style.opacity = '0.5';
            analyzeBtn.disabled = true;

            const formData = new FormData();
            formData.append('image', selectedFile);

            try {
                // Вызываем реальный API Flask!
                const response = await fetch('/api/recognize-face', { method: 'POST', body: formData });
                const result = await response.json();
                
                document.getElementById('loader').style.display = 'none';
                analyzeBtn.style.opacity = '1';
                analyzeBtn.disabled = false;

                if (result.num_faces === 0) {
                    document.getElementById('resultsContainer').innerHTML = `<div style="color: #ef4444; padding: 20px; background: rgba(239,68,68,0.1); border-radius: 12px;"><i class="fa-solid fa-triangle-exclamation"></i> Лица на фото не обнаружены!</div>`;
                    return;
                }

                document.getElementById('resultsContainer').innerHTML = `<div style="margin-bottom: 15px; color: #22c55e;"><i class="fa-solid fa-check-double"></i> Найдено лиц: ${result.num_faces}</div>`;

                const emotionNamesRus = { 'Angry': 'Досада / Гнев', 'Disgust': 'Отвращение', 'Fear': 'Страх', 'Happy': 'Радость', 'Neutral': 'Нейтрально', 'Sad': 'Грусть', 'Surprise': 'Удивление' };

                result.faces.forEach(face => {
                    const sortedScores = Object.entries(face.scores).sort((a, b) => b[1] - a[1]).slice(0, 3); // Топ 3 эмоции
                    
                    let barsHtml = '';
                    sortedScores.forEach(([emo, score]) => {
                        barsHtml += `
                            <div class="face-stat"><span>${emotionNamesRus[emo] || emo}</span><span>${score.toFixed(1)}%</span></div>
                            <div class="progress-bg" style="margin-bottom: 10px;"><div class="progress-fill" style="width: ${score}%;"></div></div>
                        `;
                    });

                    document.getElementById('resultsContainer').innerHTML += `
                        <div class="face-card">
                            <div class="face-emoji">${face.emoji}</div>
                            <div class="face-data">
                                <div class="face-title"><i class="fa-solid fa-user-focus"></i> Лицо #${face.face_id} — ${emotionNamesRus[face.emotion]}</div>
                                ${barsHtml}
                            </div>
                        </div>
                    `;
                });
            } catch (err) {
                alert("Ошибка соединения с API");
                document.getElementById('loader').style.display = 'none';
            }
        }
    </script>
</body>
</html>
