name: CI / Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Lint & Test ──────────────────────────────────────────────────────────
  test:
    name: Lint & Smoke test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install flask flask-cors gunicorn numpy pillow huggingface_hub pytest

      - name: Lint (flake8)
        run: |
          pip install flake8
          flake8 web_app/app.py --max-line-length=120 --ignore=E501,W503

      - name: Smoke test — import app
        run: |
          cd web_app
          python -c "import app; print('✅ app.py imports OK')"

  # ── Sync frontend to Cloudflare Pages ───────────────────────────────────
  deploy-frontend:
    name: Deploy Frontend → Cloudflare Pages
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Sync templates to frontend/
        run: |
          python3 scripts/sync_frontend.py

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: emotion-ai
          directory: frontend
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}

  # ── Notify Render (auto-deploy via webhook) ──────────────────────────────
  notify-render:
    name: Trigger Render Deploy
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Ping Render deploy hook
        if: ${{ secrets.RENDER_DEPLOY_HOOK != '' }}
        run: |
          curl -sS -X POST "${{ secrets.RENDER_DEPLOY_HOOK }}" \
            -H "Content-Type: application/json" \
            --fail-with-body
          echo "✅ Render deploy triggered"
